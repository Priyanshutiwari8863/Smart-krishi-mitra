<!DOCTYPE html>
<html>
<head>
<title>Nearby Shops</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h2>📍 Nearby Agriculture Shops</h2>

{% for shop in shops %}

<div class="card p-3 mt-3">
<h4>{{shop.name}}</h4>
<p>📍 {{shop.location}}</p>
<p>📞 {{shop.phone}}</p>
</div>

{% endfor %}

</body>
</html>
